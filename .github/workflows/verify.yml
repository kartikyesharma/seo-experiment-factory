name: verify
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_ID: somnath
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run site:validate -- --site somnath
      - run: npm run pdf:build -- --site somnath
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
